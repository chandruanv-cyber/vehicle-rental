<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<head>
    <title>New Booking</title>
</head>
<body>
    <section>
        <h1>Book Vehicle</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <img th:src="${vehicle.imagePath}" class="card-img-top" alt="Vehicle Image">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${vehicle.make + ' ' + vehicle.model}"></h5>
                        <p class="card-text">
                            <span th:text="${vehicle.type}"></span> | 
                            <span th:text="${vehicle.year}"></span> | 
                            $<span th:text="${vehicle.dailyRate}"></span>/day
                        </p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <form th:action="@{/bookings/new/{id}(id=${vehicle.id})}" method="post">
                    <div class="mb-3">
                        <label for="startDate" class="form-label">Start Date</label>
                        <input type="date" class="form-control" id="startDate" name="startDate" required th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                    </div>
                    <div class="mb-3">
                        <label for="endDate" class="form-label">End Date</label>
                        <input type="date" class="form-control" id="endDate" name="endDate" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Confirm Booking</button>
                    <a th:href="@{/}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </section>
    
    <script>
        document.getElementById('startDate').addEventListener('change', function() {
            document.getElementById('endDate').min = this.value;
        });
    </script>
</body>
</html>
