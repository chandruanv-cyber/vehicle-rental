<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Add New Vehicle</h1>
        <form th:action="@{/vehicles/add}" th:object="${vehicle}" method="post">
            <div class="mb-3">
                <label for="type" class="form-label">Vehicle Type</label>
                <select class="form-select" id="type" th:field="*{type}">
                    <option value="CAR">Car</option>
                    <option value="BIKE">Bike</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="make" class="form-label">Make</label>
                <input type="text" class="form-control" id="make" th:field="*{make}" required>
            </div>
            
            <div class="mb-3">
                <label for="model" class="form-label">Model</label>
                <input type="text" class="form-control" id="model" th:field="*{model}" required>
            </div>
            
            <div class="mb-3">
                <label for="year" class="form-label">Year</label>
                <input type="number" class="form-control" id="year" th:field="*{year}" required>
            </div>
            
            <div class="mb-3">
                <label for="color" class="form-label">Color</label>
                <input type="text" class="form-control" id="color" th:field="*{color}">
            </div>
            
            <div class="mb-3">
                <label for="registrationNumber" class="form-label">Registration Number</label>
                <input type="text" class="form-control" id="registrationNumber" 
                       th:field="*{registrationNumber}" required>
            </div>
            
            <div class="mb-3">
                <label for="dailyRate" class="form-label">Daily Rate ($)</label>
                <input type="number" step="0.01" class="form-control" id="dailyRate" 
                       th:field="*{dailyRate}" required>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="available" th:field="*{available}">
                <label class="form-check-label" for="available">Available</label>
            </div>
            
            <div class="mb-3">
                <label for="imagePath" class="form-label">Image URL</label>
                <input type="text" class="form-control" id="imagePath" th:field="*{imagePath}">
            </div>
            
            <button type="submit" class="btn btn-primary">Save Vehicle</button>
            <a th:href="@{/vehicles}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
